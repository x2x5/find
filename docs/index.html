<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top AI Papers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MathJax配置和库 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        
        /* 确保容器不会裁剪下拉菜单 */
        .container {
            overflow: visible;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
        }
        
        .top-bar {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            background-color: transparent;
        }

        .top-bar-inner {
            max-width: 1160px;
            margin: 0 auto;
            padding: 18px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-sizing: border-box;
            background-color: #ffffff; /* 使输入选择区成为白色圆角矩形 */
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .top-bar-row {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .version-badge {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            padding: 4px 12px;
            border-radius: 999px;
            background-color: #f2f2f2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-icon {
            font-size: 18px;
        }

        .dark-mode .version-badge {
            background-color: #3a3a3a;
            color: #ecf0f1;
        }

        .search-input {
            width: 140px;
            flex: 0 1 140px;
            min-width: 140px;
        }

        .search-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 0 0 auto;
        }

        .year-single, .year-recent {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .year-selector {
            display: inline-flex;
            align-items: center;
            min-width: 320px;
        }

        .search-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 12px;
            flex: 1 1 auto;
            justify-content: flex-start;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .year-select-hidden {
            display: none !important;
        }

        .year-slider {
            position: relative;
            width: min(360px, 62vw);
            min-width: 250px;
            height: 80px;
            padding-top: 16px;
        }

        .year-slider-track,
        .year-slider-fill {
            position: absolute;
            top: 36px;
            height: 6px;
            border-radius: 999px;
        }

        .year-slider-track {
            left: 0;
            right: 0;
            background: #d9e2ec;
        }

        .year-slider-fill {
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #3498db 0%, #2ecc71 100%);
        }

        .year-range-input {
            position: absolute;
            left: 0;
            top: 27px;
            width: 100%;
            margin: 0;
            padding: 0;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            pointer-events: none;
            z-index: 2;
        }

        .year-range-input::-webkit-slider-runnable-track {
            height: 6px;
            background: transparent;
        }

        .year-range-input::-moz-range-track {
            height: 6px;
            background: transparent;
            border: none;
        }

        .year-range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            margin-top: -5px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            background: #1f78d1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            pointer-events: auto;
            cursor: pointer;
        }

        .year-range-input::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            background: #1f78d1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            pointer-events: auto;
            cursor: pointer;
        }

        .year-range-input:focus {
            outline: none;
        }

        .year-range-input:focus::-webkit-slider-thumb {
            box-shadow: 0 0 0 3px rgba(31, 120, 209, 0.28);
        }

        .year-range-input:focus::-moz-range-thumb {
            box-shadow: 0 0 0 3px rgba(31, 120, 209, 0.28);
        }

        .year-handle-label {
            position: absolute;
            transform: translateX(-50%);
            font-size: 11px;
            line-height: 1;
            padding: 4px 7px;
            border-radius: 999px;
            color: #1c3b56;
            background: #e6f2ff;
            border: 1px solid #c8ddf2;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            font-weight: 600;
            z-index: 3;
        }

        .year-handle-label-start {
            top: 0;
        }

        .year-handle-label span {
            margin-left: 4px;
            font-size: 12px;
            font-weight: 700;
        }

        .year-handle-label-end {
            top: 48px;
            background: #effaf0;
            border-color: #cde8cf;
            color: #20592b;
        }

        .field-dropdown {
            background-color: #ce93d8;
            padding: 4px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            flex: 0 1 120px;
        }

        .field-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 1 auto;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .field-group .field-dropdown {
            flex: 1 1 120px;
            min-width: 110px;
            max-width: 160px;
            margin-bottom: 0;
        }

        .field-dropdown[data-field="CV"] { background-color: #8bc34a; }
        .field-dropdown[data-field="AI"] { background-color: #ff9a9a; }
        .field-dropdown[data-field="All"] { 
            background-color: #333;
            min-width: 80px;
            flex: 0 0 auto;
            padding: 4px 14px;
        }

        .field-label {
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            font-size: 13px;
            gap: 4px;
            white-space: nowrap;
            justify-content: center;
        }

        .field-label i {
            font-size: 10px;
        }

        .dark-mode .top-bar-button {
            background-color: #1f4f7a;
        }

        .dark-mode .top-bar-button.secondary {
            background-color: #4a4a4a;
        }

        .dark-mode .top-bar-input {
            background-color: #2d2d2d;
            color: #ecf0f1;
            border-color: #444;
        }

        .dark-mode #year-separator {
            color: #ecf0f1;
        }

        .dark-mode .year-slider-track {
            background: #3c4959;
        }

        .dark-mode .year-slider-fill {
            background: linear-gradient(90deg, #4ea8de 0%, #57cc99 100%);
        }

        .dark-mode .year-handle-label {
            background: #213449;
            border-color: #345272;
            color: #d7e8f6;
        }

        .dark-mode .year-handle-label-end {
            background: #233b33;
            border-color: #356350;
            color: #d8f1e1;
        }

        .dark-mode .year-range-input::-webkit-slider-thumb {
            border-color: #1f2a38;
        }

        .dark-mode .year-range-input::-moz-range-thumb {
            border-color: #1f2a38;
        }

        .dark-mode .field-dropdown[data-field="All"] {
            background-color: #111;
        }

        .dark-mode .field-label {
            color: #ecf0f1;
        }

        @media (max-width: 768px) {
            .top-bar-inner {
                padding: 16px;
                gap: 14px;
            }

            .top-bar-row-1,
            .top-bar-row-3 {
                gap: 12px;
            }

            .search-input {
                flex: 1 1 200px;
            }

            .year-slider {
                width: min(360px, 70vw);
            }

            .field-dropdown {
                min-width: 120px;
            }

            .search-group {
                margin-left: 0;
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 480px) {
            .top-bar-inner {
                padding: 14px;
            }

            .top-bar-row-1,
            .top-bar-row-2,
            .top-bar-row-3 {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .search-input {
                width: 100%;
            }

            .year-selector {
                width: 100%;
                flex-wrap: wrap;
            }

            .year-slider {
                width: 100%;
                min-width: 0;
            }

            .field-dropdown {
                width: 100%;
                min-width: 0;
                justify-content: flex-start;
            }

            .search-group {
                margin-left: 0;
                width: 100%;
                flex-wrap: wrap;
            }
        }
        
        /* 确保顶部栏中的下拉框具有最高优先级 */
        .top-bar .field-dropdown {
            z-index: 20000;
            position: relative;
        }

        .top-bar .dropdown-content {
            z-index: 99999;
            position: absolute !important;
            top: 100% !important;
            left: 0 !important;
            right: auto !important;
            width: auto !important;
            min-width: 200px !important;
            display: none;
        }
        
        .top-bar .dropdown-content.show {
            display: flex !important;
        }
        
        .dark-mode .top-bar {
            background-color: transparent; /* 顶部栏底色透明，由内部白卡片/深色卡片呈现 */
            border-bottom-color: transparent;
            box-shadow: none;
        }

        /* 夜间模式下的顶部白卡片改为深色卡片 */
        .dark-mode .top-bar-inner {
            background-color: #2d2d2d;
            border-color: #444;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        
        .content-wrapper {
            max-width: 1160px;
            margin: 0 auto;
            padding: 0 28px;
            box-sizing: border-box;
        }

        .paper-container {
            flex: 1;
            overflow: auto;
            padding: 12px 0;
            width: 100%;
            box-sizing: border-box;
            margin-top: 0;
        }
        
        /* 确保表格容器始终占满整个paper-container */
        .paper-container > .table-container {
            width: 100% !important;
        }
        
        .sidebar {
            display: none; /* 隐藏原来的侧边栏 */
        }
        
        /* 顶部栏内的元素样式 */
        .top-bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 单年份复选框基础样式 */
        .top-bar-item label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        #single-year-checkbox {
            cursor: pointer;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            /* 增加触摸区域 */
            position: relative;
        }
        
        /* 增加复选框的触摸区域 */
        #single-year-checkbox::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
        }
        
        .top-bar-item label span {
            white-space: nowrap;
        }
        
        #year-separator {
            flex-shrink: 0;
        }
        
        .top-bar-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .top-bar-button {
            padding: 8px 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .top-bar-button:hover {
            background-color: #2980b9;
        }
        
        .top-bar-button.secondary {
            background-color: #6c757d;
        }
        
        .top-bar-button.secondary:hover {
            background-color: #5a6268;
        }
        
        .theme-toggle-top {
            margin-left: auto;
            cursor: pointer;
            font-size: 20px;
        }
        
        /* 夜间模式样式 */
        .dark-mode .top-bar-input {
            background-color: #2d2d2d;
            color: #ecf0f1;
            border-color: #444;
        }
        
        .dark-mode .top-bar-button.secondary {
            background-color: #34495e;
            color: #ecf0f1;
        }
        
        .dark-mode .top-bar-button.secondary:hover {
            background-color: #4a5568;
        }
        
        .dark-mode .stats-progress {
            color: #bdc3c7 !important;
        }
        
        /* 固定单行布局 */
        .top-bar {
            width: 100%;
            overflow: visible; /* 允许下拉菜单显示 */
        }

        .top-bar-row {
            width: 100%;
            max-width: 100%;
            flex-wrap: nowrap; /* 防止换行 */
        }
        
        /* 中等屏幕适配 */
        @media (max-width: 1200px) {
            .top-bar-row {
                gap: 4px !important;
                overflow: visible !important;
            }
            
            #topic-input {
                width: 100px !important;
                flex-shrink: 1;
            }
            
            .field-dropdown {
                padding: 3px 4px !important;
                font-size: 10px !important;
                flex-shrink: 1;
            }
            
            .field-dropdown span {
                font-size: 10px !important;
            }
            
            .stats-progress {
                font-size: 9px !important;
                margin: 0 2px !important;
                flex-shrink: 1;
                min-width: 45px !important;
                width: 45px !important;
                text-align: center !important;
            }
            
            .top-bar-button {
                padding: 4px 6px !important;
                font-size: 10px !important;
                flex-shrink: 1;
            }
            
            .top-bar-input {
                padding: 4px 6px !important;
                font-size: 10px !important;
                flex-shrink: 1;
            }
            
            #start-year, #end-year {
                min-width: 50px !important;
                width: 50px !important;
            }
        }
        
        /* 平板适配 */
        @media (max-width: 768px) {
            .top-bar {
                padding: 5px 2px;
                width: calc(100% - 20px);
                border-radius: 0 0 6px 6px;
            }
            
            .top-bar-row {
                gap: 6px !important;
                justify-content: flex-start !important;
                padding: 0 3px;
                width: 100% !important;
                max-width: 100% !important;
                overflow: visible !important;
                flex-wrap: wrap !important;
            }
            
            .top-bar-input {
                padding: 3px 5px !important;
                font-size: 11px !important;
                flex-shrink: 1;
            }
            
            .top-bar-button {
                padding: 3px 6px !important;
                font-size: 11px !important;
                flex-shrink: 1;
            }
            
            #topic-input {
                width: 80px !important;
                flex-shrink: 1;
            }

            .field-dropdown {
                width: calc(32% - 4px) !important;
                min-width: 90px !important;
                max-width: 120px !important;
                margin-top: 4px;
            }

            .field-dropdown[data-field="All"] {
                margin-left: 0 !important;
                width: calc(32% - 4px) !important;
            }
            
            /* 单年份复选框移动端样式 */
            #single-year-checkbox {
                width: 14px !important;
                height: 14px !important;
                flex-shrink: 0;
            }
            
            .top-bar-item label {
                gap: 2px !important;
            }
            
            .top-bar-item label span {
                font-size: 11px !important;
            }
            
            #start-year, #end-year {
                min-width: 50px !important;
            }
            
            #year-separator {
                font-size: 14px !important;
                margin: 0 1px !important;
            }
            
            .field-dropdown {
                padding: 2px 3px !important;
                font-size: 9px !important;
                flex-shrink: 1;
            }
            
            .field-dropdown span {
                font-size: 9px !important;
            }
            
            .stats-progress {
                font-size: 8px !important;
                margin: 0 1px !important;
                flex-shrink: 1;
                min-width: 40px !important;
                width: 40px !important;
                text-align: center !important;
            }
            
            .theme-toggle-top {
                font-size: 14px;
                flex-shrink: 0;
            }
            
            #start-year, #end-year {
                min-width: 45px !important;
                width: 45px !important;
                font-size: 9px !important;
                padding: 2px 3px !important;
            }
        }
        
        /* 手机适配 */
        @media (max-width: 480px) {
            .top-bar {
                padding: 3px 1px;
                width: calc(100% - 10px);
                border-radius: 0 0 4px 4px;
            }
            
            .paper-container {
                margin-top: 0;
            }
            
            .top-bar-row {
                gap: 4px !important;
                padding: 0 2px;
                width: 100% !important;
                max-width: 100% !important;
                flex-wrap: wrap !important;
                overflow: visible !important;
            }
            
            .top-bar-input {
                padding: 2px 4px !important;
                font-size: 10px !important;
                flex-shrink: 1;
                min-width: 30px !important;
            }
            
            .top-bar-button {
                padding: 2px 4px !important;
                font-size: 10px !important;
                flex-shrink: 1;
            }
            
            #topic-input {
                width: 50px !important;
                flex-shrink: 1;
                min-width: 40px !important;
            }
            
            .field-dropdown {
                padding: 2px 3px !important;
                font-size: 8px !important;
                flex-shrink: 1;
                width: calc(48% - 4px) !important;
                min-width: 120px !important;
            }
            
            .field-dropdown span {
                font-size: 8px !important;
            }
            
            /* 单年份复选框小屏幕样式 */
            #single-year-checkbox {
                width: 12px !important;
                height: 12px !important;
                flex-shrink: 0;
                min-width: 12px !important;
            }
            
            .top-bar-item label {
                gap: 1px !important;
                flex-shrink: 0;
            }
            
            .top-bar-item label span {
                font-size: 10px !important;
                white-space: nowrap;
            }
            
            #start-year, #end-year {
                min-width: 42px !important;
                padding: 2px 3px !important;
            }
            
            #year-separator {
                font-size: 12px !important;
                margin: 0 !important;
                padding: 0 1px !important;
            }
            
            .stats-progress {
                font-size: 7px !important;
                margin: 0 1px !important;
                flex-shrink: 1;
                min-width: 35px !important;
                width: 35px !important;
                text-align: center !important;
            }
            
            .theme-toggle-top {
                font-size: 12px;
                flex-shrink: 0;
            }
            
            /* 复选框更小 */
            .field-main-checkbox {
                transform: scale(0.6) !important;
            }
            
            /* 下拉箭头更小 */
            .dropdown-toggle i {
                font-size: 7px !important;
            }
            
            #start-year, #end-year {
                min-width: 40px !important;
                width: 40px !important;
                font-size: 8px !important;
                padding: 2px !important;
            }
        }
        .paper-container {
            flex: 1;
            overflow: auto;
        }
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            max-width: 240px;
        }
        .papers-grid {
            display: none; /* Hidden by default */
            gap: 16px;
            margin-top: 5px;
        }
        .papers-grid.view-active {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columns when active */
        }
        .field-filters-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 3px;
        }
        .field-dropdown {
            flex-basis: 47%;
            margin-bottom: 5px;
            font-size: 0.85em;
        }
        .field-label {
            white-space: nowrap;
            font-size: 0.85em;
            padding: 2px;
        }
        .sidebar-section {
            padding: 8px;
        }
        .dropdown-toggle i {
            font-size: 0.85em;
        }
        
        .dropdown-content {
            position: absolute;
            display: none;
            background-color: #fff;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 99999;
            border-radius: 5px;
            padding: 10px;
            width: 100%;
            left: 0;
            margin-top: 5px;
            flex-direction: row !important;
            flex-wrap: wrap !important;
            top: 100%;
        }
        
        .dropdown-content.show {
            display: flex !important;
        }
        
        .conference-option {
            background-color: #f9f9f9;
            border-radius: 4px;
            padding: 5px 10px;
            margin: 3px;
            display: flex;
            align-items: center;
            cursor: pointer;
            flex: 0 0 auto;
            color: #333;
        }
        
        .conference-option:hover {
            background-color: #f1f1f1;
        }
        
        .field-dropdown {
            position: relative;
            z-index: 10000;
        }
        
        /* List view styles */
        .table-container {
            width: 100% !important;
            min-width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .papers-list-view {
            width: 100% !important;
            max-width: 100% !important;

            color: #d8e4f0;
        }

        .dark-mode .year-select {
            background: #1f2b37;
            color: #ecf0f1;
            border-color: #3f556c;
        }

        .dark-mode .conference-timeline-month-label {
            color: #d0dfef;
        }

        .dark-mode .conference-timeline-month-tick {
            border-top-color: #45617d;
        }

        .dark-mode .conference-timeline-event.event-deadline .conference-timeline-event-chip {
            color: #d8e8fb;
            background: #22364c;
            border-color: #3e5f81;
        }

        .dark-mode .conference-timeline-event.event-result .conference-timeline-event-chip {
            color: #ffdfc7;
            background: #4b3425;
            border-color: #7e5a41;
        }

        .dark-mode .conference-timeline-event.event-today .conference-timeline-event-chip {
            color: #d7ffe6;
            background: #1f4a34;
            border-color: #3f7a59;
        }

        .dark-mode .conference-timeline-side-label.side-left {
            color: #d8e8fb;
            background: #22364c;
            border-color: #3e5f81;
        }

        .dark-mode .conference-timeline-side-label.side-right {
            color: #ffdfc7;
            background: #4b3425;
            border-color: #7e5a41;
        }

        @media (min-width: 1101px) {
            .container {
                padding-right: 20px !important;
            }
        }

        @media (max-width: 1100px) {
            .main-content {
                grid-template-columns: 1fr !important;
                grid-template-areas:
                    "top"
                    "content"
                    "timeline";
            }

            .main-content > .conference-timeline-card {
                position: static;
                max-height: none;
            }

            .conference-timeline-scroll {
                max-height: none;
            }

            .top-bar-row.control-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                width: 100%;
                flex-wrap: wrap;
            }

            .control-group-year {
                margin-left: 0;
            }
        }

        @media (max-width: 768px) {
            #topic-input.search-input {
                width: 100% !important;
                min-width: 0;
                flex: 1 1 auto;
            }

            .search-controls {
                width: 100%;
            }

            .field-group {
                width: 100%;
                flex-wrap: wrap;
            }

            .field-dropdown {
                min-width: calc(50% - 6px);
                flex: 1 1 calc(50% - 6px);
            }

            .control-group-main .field-group .field-dropdown,
            .control-group-main .field-group .field-dropdown[data-field="ML"],
            .control-group-main .field-group .field-dropdown[data-field="CV"],
            .control-group-main .field-group .field-dropdown[data-field="AI"],
            .control-group-main .field-group .field-dropdown[data-field="All"] {
                min-width: calc(50% - 6px) !important;
                max-width: none !important;
                width: auto !important;
                flex: 1 1 calc(50% - 6px) !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <section class="conference-timeline-card" aria-label="会议投稿截止时间轴">
                <div class="conference-timeline-head">
                    <h2 class="conference-timeline-title">会议投稿截止时间轴（按月-日）</h2>
                    <p class="conference-timeline-note">主要参考 2025 年公开时间安排，实际每年可能调整。</p>
                    <p class="conference-timeline-current" id="conference-timeline-current">今天 --</p>
                </div>
                <div class="conference-timeline-scroll">
                    <div class="conference-timeline-track" id="conference-timeline-track">
                        <div class="conference-timeline-line"></div>
                        <div class="conference-timeline-today" id="conference-timeline-today">
                            <span class="conference-timeline-today-label" id="conference-timeline-today-label"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 顶部导航栏 -->
            <div class="top-bar">
                <div class="top-bar-inner">
                    <div class="top-bar-row top-bar-row-1 control-panel">
                        <div class="control-group control-group-main">
                            <div class="search-controls">
                                <input type="text" id="topic-input" class="top-bar-input search-input" placeholder="flow matching">
                                <button id="search-btn" class="top-bar-button">搜索</button>
                            </div>
                            <div class="field-group">
                                <div class="field-dropdown" data-field="ML">
                                    <div class="field-label dropdown-toggle" data-field="ML">
                                        <input type="checkbox" class="field-main-checkbox" data-field="ML" checked>
                                        <span>ML</span>
                                        <i class="fas fa-caret-down"></i>
                                    </div>
                                    <div class="dropdown-content" id="dropdown-ML"></div>
                                </div>
                                <div class="field-dropdown" data-field="CV">
                                    <div class="field-label dropdown-toggle" data-field="CV">
                                        <input type="checkbox" class="field-main-checkbox" data-field="CV" checked>
                                        <span>CV</span>
                                        <i class="fas fa-caret-down"></i>
                                    </div>
                                    <div class="dropdown-content" id="dropdown-CV"></div>
                                </div>
                                <div class="field-dropdown" data-field="AI">
                                    <div class="field-label dropdown-toggle" data-field="AI">
                                        <input type="checkbox" class="field-main-checkbox" data-field="AI">
                                        <span>AI</span>
                                        <i class="fas fa-caret-down"></i>
                                    </div>
                                    <div class="dropdown-content" id="dropdown-AI"></div>
                                </div>
                                <div class="field-dropdown" data-field="All">
                                    <div class="field-label" data-field="All">
                                        <input type="checkbox" id="select-all-checkbox" class="field-main-checkbox" data-field="All">
                                        <span>All</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="control-group control-group-year">
                            <label class="year-recent">
                                <input type="checkbox" id="recent-checkbox">
                                <span>近两年</span>
                            </label>
                            <div class="year-selector">
                                <select id="start-year" class="top-bar-input year-select">
                                    <option value="2026">2026</option>
                                    <option value="2025">2025</option>
                                    <option value="2024" selected>2024</option>
                                    <option value="2023">2023</option>
                                    <option value="2022">2022</option>
                                    <option value="2021">2021</option>
                                    <option value="2020">2020</option>
                                    <option value="2019">2019</option>
                                </select>
                                <span id="year-separator">&rarr;</span>
                                <select id="end-year" class="top-bar-input year-select">
                                    <option value="2025" selected>2025</option>
                                    <option value="2024">2024</option>
                                    <option value="2023">2023</option>
                                    <option value="2022">2022</option>
                                    <option value="2021">2021</option>
                                    <option value="2020">2020</option>
                                    <option value="2019">2019</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 原来的侧边栏 - 隐藏 -->
            <div class="sidebar" style="display: none;">
            </div>
            
            <!-- 主要内容区域 -->
            <div class="content-wrapper">
            <div class="paper-container">
                
                <div id="loading" class="loading" style="display: none;">Loading papers...</div>
                <div id="no-results" class="no-results">
                    Please select a topic and sample a batch of papers..
                </div>
                
                <!-- 论文统计信息 - 简化版本，只显示总数 -->
                <div id="papers-stats" class="papers-stats" style="display: none !important; margin-bottom: 15px; padding: 10px; background-color: #f8f9fa; border-radius: 8px; border-left: 4px solid #4a4a4a;">
                    <div class="stats-content" style="display: flex; justify-content: center; align-items: center;">
                        <div class="stats-text" style="font-size: 14px; color: #555;">
                            <span id="papers-count-text">找到 <strong id="total-papers-count">0</strong> 篇符合要求的论文</span>
                        </div>
                    </div>
                </div>
                
                <div class="table-container" style="width: 100% !important; min-width: 100% !important; max-width: 100% !important; box-sizing: border-box; overflow: hidden;">
                    <table id="papers-list-view" class="papers-list-view" style="width: 100% !important; min-width: 100% !important; max-width: 100% !important; table-layout: fixed !important; border-collapse: collapse;">
                        <thead>
                            <tr style="width: 100% !important;">
                                <th style="width: 15% !important; min-width: 15% !important; max-width: 15% !important; padding: 8px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Conference</th>
                                <th style="width: 10% !important; min-width: 10% !important; max-width: 10% !important; padding: 8px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Year</th>
                                <th id="title-header" style="width: 75% !important; min-width: 75% !important; max-width: 75% !important; padding: 8px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer;">Title (click to copy all)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Paper list items will be inserted here -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 翻页控件 -->
                <div id="pagination-container" class="pagination-container" style="display: none; text-align: center; padding: 20px; margin: 20px 0;">
                    <div class="pagination-controls" style="display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;">
                        <button id="prev-page-btn" class="pagination-btn" style="padding: 8px 16px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;" disabled>
                            <i class="fas fa-chevron-left"></i> 上一页
                        </button>
                        
                        <div class="pagination-info" style="display: flex; align-items: center; gap: 10px; font-size: 14px; color: #666;">
                            <span>第</span>
                            <input type="number" id="current-page-input" min="1" value="1" style="width: 60px; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 14px;">
                            <span>页</span>
                            <span>/</span>
                            <span>共 <span id="total-pages">1</span> 页</span>
                        </div>
                        
                        <button id="next-page-btn" class="pagination-btn" style="padding: 8px 16px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
                            下一页 <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    
                    <div class="pagination-summary" style="margin-top: 10px; font-size: 13px; color: #777;">
                        显示第 <span id="page-start">1</span> - <span id="page-end">50</span> 篇，共 <span id="total-papers-pagination">0</span> 篇论文
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="version-info">Top AI Papers · updated</div>
    </footer>

    <!-- 移动端侧边栏切换按钮 -->

    <!-- 返回顶部按钮 -->
    <div id="back-to-top" class="back-to-top" style="display: none;">
        <i class="fas fa-chevron-up"></i>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
