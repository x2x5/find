<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面标题</title>
<style>
  :root {
    --bg: #f1f5f9; --card-bg: #ffffff; --fg: #0f172a; --muted: #64748b;
    --accent: #6366f1; --accent2: #ec4899; --accent3: #f59e0b;
    --shadow: 0 20px 60px -12px rgba(0,0,0,0.08), 0 4px 18px -6px rgba(0,0,0,0.03);
    --grad: linear-gradient(135deg, #6366f1, #a78bfa, #ec4899);
    --border: rgba(148,163,184,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --card-bg: #1a1a2e; --fg: #e8e8f0;
      --muted: #94a3b8; --shadow: 0 20px 60px -12px rgba(0,0,0,0.5);
      --border: rgba(148,163,184,0.06);
    }
    .slide { background: linear-gradient(135deg, color-mix(in srgb, var(--t,#6366f1) 14%, var(--card-bg)) 0%, var(--card-bg) 50%); }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--fg); user-select:none;
  }

  #progress { position:fixed; top:0; left:0; height:3px; background:var(--grad); z-index:100; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow:0 1px 4px rgba(99,102,241,0.15); }

  .main-area {
    display:flex; flex-direction:column; align-items:center;
    height:100vh; padding:1vh 32px 0;
  }

  .track-wrap { width:100%; position:relative; overflow:hidden; border-radius:24px; flex:1; display:flex; flex-direction:column; }
  .track { display:flex; transition:transform 0.55s cubic-bezier(0.4,0,0.2,1); will-change:transform; flex:1; }
  .slide {
    flex:0 0 100%; display:flex; gap:48px; align-items:center;
    background: linear-gradient(135deg, color-mix(in srgb, var(--t,#6366f1) 7%, var(--card-bg)) 0%, var(--card-bg) 50%);
    border:1px solid var(--border);
    border-radius:24px; padding:60px 64px; box-shadow:var(--shadow);
    min-height:480px; transition:box-shadow 0.4s;
  }
  .slide-left { flex:1.2; min-width:0; }
  .slide-right { flex:0.8; min-width:0; display:flex; align-items:center; justify-content:center; }

  .s-q {
    display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.5px;
    padding:3px 12px; border-radius:999px; margin-bottom:12px;
  }
  .s-q.what { background:#eef2ff; color:#4f46e5; border:1px solid rgba(99,102,241,0.10); }
  .s-q.why { background:#fdf2f8; color:#be185d; border:1px solid rgba(236,72,153,0.10); }
  .s-q.how { background:#fffbeb; color:#b45309; border:1px solid rgba(245,158,11,0.10); }

  .slide-title { font-size:28px; font-weight:700; line-height:1.35; margin-bottom:16px; }
  .slide-title .hl { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

  .slide-body { font-size:16px; line-height:1.8; color:var(--muted); }
  .slide-body p { margin-bottom:8px; }
  .slide-body p:last-child { margin-bottom:0; }
  .slide-body strong { color:var(--fg); font-weight:600; }
  .slide-body code {
    background:var(--bg); padding:2px 8px; border-radius:5px; font-size:14px;
    font-family: 'SF Mono', 'Fira Code', monospace; color:var(--fg);
  }
  .slide-body a { color:var(--accent); text-decoration:none; font-weight:500; }
  .slide-body ol { margin:6px 0 0 18px; padding:0; }
  .slide-body li { margin-bottom:5px; }

  .v-card {
    background:var(--bg); border-radius:16px; padding:20px 24px;
    width:100%; border:1px solid var(--border);
  }

  .bottom-bar {
    display:flex; align-items:center;
    width:100%; max-width:1120px; padding:4px 48px 6px; gap:8px;
  }
  .back-home {
    font-size:13px; color:var(--muted); text-decoration:none; font-weight:500;
    padding:5px 14px; border-radius:999px; border:1px solid rgba(128,128,128,0.15);
    background:var(--card-bg); transition:all 0.2s; white-space:nowrap; flex-shrink:0; line-height:1.4;
  }
  .back-home:hover { border-color:var(--accent); color:var(--accent); }

  .page-num {
    position:absolute; top:12px; right:14px; z-index:10;
    font-size:12px; font-weight:600; letter-spacing:0.5px;
    color:#fff; background:rgba(0,0,0,0.5);
    padding:3px 8px; border-radius:999px;
    opacity:0; transition:opacity 0.25s; pointer-events:none;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  .page-num.show { opacity:1; pointer-events:auto; }

  .nav-btn {
    position:absolute; top:50%; transform:translateY(-50%); z-index:50;
    width:44px; height:44px; border-radius:50%; border:none;
    background:var(--card-bg); color:var(--fg);
    box-shadow:0 4px 20px -4px rgba(0,0,0,0.10); cursor:pointer; font-size:22px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; border:1px solid var(--border); backdrop-filter:blur(8px);
  }
  .nav-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); transform:translateY(-50%) scale(1.08); box-shadow:0 6px 24px -4px rgba(99,102,241,0.25); }
  #goFirst { left:-46px; }
  #prev { left:4px; }
  #next { right:4px; }
  #goLast { right:-46px; }
  .nav-btn.faded { opacity:0.25; pointer-events:none; cursor:default; }
  #goFirst, #goLast { display:none; }
  #goFirst.show, #goLast.show { display:flex; }

  #stage { padding:0 48px; }
  .dots-wrap { display:flex; align-items:center; justify-content:center; }
  .dots { display:flex; gap:5px; }
  .dot {
    width:7px; height:7px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(128,128,128,0.20); transition:all 0.3s; padding:0;
  }
  .dot:hover { background:rgba(128,128,128,0.35); }
  .dot.active { background:var(--accent); width:22px; border-radius:4px; }

  .slide { opacity:0; transform:translateY(10px); transition:opacity 0.4s 0.05s, transform 0.4s 0.05s; }
  .slide.active { opacity:1; transform:translateY(0); }

  @media (max-width:720px) {
    .main-area { height:100vh; padding:0 8px; }
    .slide { flex-direction:column; gap:14px; padding:24px 18px; min-height:auto; }
    .slide-left, .slide-right { width:100%; }
    .slide-title { font-size:22px; }
    .nav-btn { width:34px; height:34px; font-size:14px; }
    #goFirst { left:-34px; }
    #prev { left:4px; }
    #next { right:4px; }
    #goLast { right:-34px; }
    #stage { padding:0 4px; }
  }
</style>
</head>
<body>

<div id="progress"></div>

<div class="main-area">

  <div id="stage" style="position:relative;width:100%;max-width:1120px;flex:1;display:flex;flex-direction:column">
    <button class="nav-btn" id="goFirst" style="position:absolute;top:50%;transform:translateY(-50%);z-index:49;width:44px;height:44px;border-radius:50%;border:none;background:var(--card-bg);color:var(--fg);box-shadow:0 4px 20px -4px rgba(0,0,0,0.10);cursor:pointer;font-size:16px;transition:all 0.2s;border:1px solid var(--border)">«</button>
    <button class="nav-btn" id="prev" style="position:absolute;top:50%;transform:translateY(-50%);z-index:50;width:44px;height:44px;border-radius:50%;border:none;background:var(--card-bg);color:var(--fg);box-shadow:0 4px 20px -4px rgba(0,0,0,0.10);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;border:1px solid var(--border);left:4px">‹</button>
    <button class="nav-btn" id="next" style="position:absolute;top:50%;transform:translateY(-50%);z-index:50;width:44px;height:44px;border-radius:50%;border:none;background:var(--card-bg);color:var(--fg);box-shadow:0 4px 20px -4px rgba(0,0,0,0.10);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;border:1px solid var(--border);right:4px">›</button>
    <button class="nav-btn" id="goLast" style="position:absolute;top:50%;transform:translateY(-50%);z-index:49;width:44px;height:44px;border-radius:50%;border:none;background:var(--card-bg);color:var(--fg);box-shadow:0 4px 20px -4px rgba(0,0,0,0.10);cursor:pointer;font-size:16px;transition:all 0.2s;border:1px solid var(--border)">»</button>
    <div class="track-wrap" style="overflow:hidden;border-radius:24px">
    <div class="page-num" id="pageNum"><span id="pageNumText">1 / 9</span></div>
    <div class="track" id="track">

      <!-- ===== 在这里添加你的幻灯片 ===== -->
      <!-- 每张幻灯片结构： -->
      <!--
      <div class="slide" style="--t:#主题色">
        <div class="slide-left">
          <div class="s-q what/why/how">🏷️ 标签</div>
          <div class="slide-title">标题文字<span class="hl">高亮</span></div>
          <div class="slide-body">
            <p>正文内容...</p>
          </div>
        </div>
        <div class="slide-right">
          <!-- 右侧可视化区域 -->
        </div>
      </div>
      -->

      <!-- 示例幻灯片 1（默认激活） -->
      <div class="slide active" style="--t:#6366f1">
        <div class="slide-left">
          <div class="s-q what">📌 示例页面</div>
          <div class="slide-title">欢迎使用<span class="hl">幻灯片模板</span></div>
          <div class="slide-body">
            <p>这是一个可复用的幻灯片模板。每页分为<strong>左侧文字</strong>和<strong>右侧可视化</strong>两个区域。</p>
            <p>上下页通过键盘 <code>← →</code>、滚轮、触摸滑动、或点击左右箭头导航。</p>
          </div>
        </div>
        <div class="slide-right">
          <div class="v-card" style="text-align:center;padding:30px 20px;background:linear-gradient(135deg,color-mix(in srgb,var(--t,#6366f1) 15%,transparent),color-mix(in srgb,var(--t,#6366f1) 5%,transparent))">
            <div style="font-size:72px;margin-bottom:8px">🎠</div>
            <div style="font-size:24px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">幻 灯 片</div>
            <div style="font-size:14px;color:var(--muted);margin-top:6px">每页有自己的主题色</div>
          </div>
        </div>
      </div>

      <!-- 示例幻灯片 2 -->
      <div class="slide" style="--t:#8b5cf6">
        <div class="slide-left">
          <div class="s-q why">💡 使用说明</div>
          <div class="slide-title">复制这个文件<span class="hl">开始编辑</span></div>
          <div class="slide-body">
            <p>把 <code>.slide</code> 里面的内容替换成你自己的即可。</p>
            <p><strong>主题色</strong> — 在 <code>style="--t:#色值"</code> 里设置，幻灯片背景会自动适配。</p>
            <p><strong>标签</strong> — 用 <code>.s-q.what</code> / <code>.s-q.why</code> / <code>.s-q.how</code> 区分内容类型。</p>
          </div>
        </div>
        <div class="slide-right">
          <div style="width:100%;display:flex;flex-direction:column;gap:10px">
            <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border)">
              <div style="font-size:28px;margin-bottom:4px">🎨</div>
              <div style="font-size:14px;font-weight:600">设置 --t 即可换色</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div class="bottom-bar">
    <a href="/" class="back-home">← 返回主页</a>
    <div style="flex:1;display:flex;justify-content:center"><div class="dots-wrap"><div class="dots" id="dots"></div></div></div>
  </div>
</div>

<script>
const track = document.getElementById('track');
const slides = track.querySelectorAll('.slide');
const total = slides.length;
let current = 0;
let animating = false;

const progress = document.getElementById('progress');
const pageNum = document.getElementById('pageNum');
const pageNumText = document.getElementById('pageNumText');
const dots = document.getElementById('dots');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const goFirst = document.getElementById('goFirst');
const goLast = document.getElementById('goLast');

function updateNavState() {
  goFirst.classList.toggle('show', current > 0);
  goLast.classList.toggle('show', current < total - 1);
  prevBtn.classList.toggle('faded', current === 0);
  nextBtn.classList.toggle('faded', current === total - 1);
}

for (let i = 0; i < total; i++) {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => go(i));
  dots.appendChild(dot);
}

let pageNumTimer;

function showPageNum() {
  pageNum.classList.add('show');
  clearTimeout(pageNumTimer);
  pageNumTimer = setTimeout(() => pageNum.classList.remove('show'), 1600);
}

function go(i) {
  if (animating || i === current || i < 0 || i >= total) return;
  animating = true;
  slides[current].classList.remove('active');
  dots.children[current].classList.remove('active');
  current = i;
  slides[current].classList.add('active');
  dots.children[current].classList.add('active');
  track.style.transform = `translateX(-${current * 100}%)`;
  progress.style.width = `${((current + 1) / total) * 100}%`;
  pageNumText.textContent = `${current + 1} / ${total}`;
  showPageNum();
  updateNavState();
  setTimeout(() => { animating = false; }, 560);
}

prevBtn.addEventListener('click', () => go(current - 1));
nextBtn.addEventListener('click', () => go(current + 1));
goFirst.addEventListener('click', () => go(0));
goLast.addEventListener('click', () => go(total - 1));

updateNavState();

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { go(current - 1); showPageNum(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { go(current + 1); showPageNum(); }
});

let wheelTimeout;
document.addEventListener('wheel', (e) => {
  e.preventDefault();
  clearTimeout(wheelTimeout);
  const d = Math.sign(e.deltaY);
  if (d > 0) { go(current + 1); showPageNum(); }
  else if (d < 0) { go(current - 1); showPageNum(); }
  wheelTimeout = setTimeout(() => {}, 600);
}, { passive: false });

let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 40) {
    if (dx < 0) { go(current + 1); showPageNum(); }
    else { go(current - 1); showPageNum(); }
  }
}, { passive: true });
</script>

</body>
</html>
